# Render Blueprint
services:
  - type: web
    name: amemory
    runtime: node
    plan: free
    buildCommand: npm run render:build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: MEMORIES_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
