# Render Blueprint — для сохранения фото/видео нужен диск (план Starter+)
services:
  - type: web
    name: amemory
    runtime: node
    plan: starter
    buildCommand: npm run render:build
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: amemory-persistent
      mountPath: /opt/render/project/src/persistent
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: PERSISTENT_PATH
        value: /opt/render/project/src/persistent
      - key: MEMORIES_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
