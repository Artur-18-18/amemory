# Render Blueprint — PostgreSQL хранит все медиа и данные (не пропадают после сна)
databases:
  - name: amemory-db
    databaseName: amemory
    user: amemory
    plan: free

services:
  - type: web
    name: amemory
    runtime: python
    plan: free
    buildCommand: npm run render:build
    startCommand: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: amemory-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: MEMORIES_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
