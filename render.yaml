# Render Blueprint — Docker (Node + Python) + PostgreSQL
databases:
  - name: amemory-db
    databaseName: amemory
    user: amemory

services:
  - type: web
    name: amemory
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    # Если используете Node runtime вместо Docker:
    # buildCommand: npm install && npm run render:build
    # startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: amemory-db
          property: connectionString
      - key: MEMORIES_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
